apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "gar-credential-provider.fullname" . }}
  namespace: {{ include "gar-credential-provider.namespace" . }}
  labels:
    {{- include "gar-credential-provider.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "gar-credential-provider.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gar-credential-provider.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod recreation when config changes
        checksum/config: {{ include "gar-credential-provider.gcpConfig" . | sha256sum }}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              # Only schedule on nodes WITHOUT this label
              # After setup completes, node gets labeled and pod won't reschedule
              - key: gar-credential-provider/configured
                operator: NotIn
                values:
                - "{{ .Values.image.tag }}"
      serviceAccountName: {{ include "gar-credential-provider.fullname" . }}
      hostPID: true
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: setup
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/gar-credential-provider", "setup"]
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: VERSION
          value: "{{ .Values.image.tag }}"
        - name: GCP_CONFIG
          value: {{ include "gar-credential-provider.gcpConfig" . | fromJson | toJson | quote }}
        - name: REGISTRIES
          value: "{{ .Values.registries }}"
        securityContext:
          privileged: true
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: host-root
          mountPath: /host
      volumes:
      - name: host-root
        hostPath:
          path: /
