apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "gar-credential-provider.fullname" . }}
  labels:
    {{- include "gar-credential-provider.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "gar-credential-provider.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "gar-credential-provider.fullname" . }}
  namespace: {{ include "gar-credential-provider.namespace" . }}
